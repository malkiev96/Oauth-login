server:
  port: 8080

spring:
  cloud:
    gateway:
      default-filters:
        - RemoveResponseHeader=Cookie,Set-Cookie
        - StripPrefix=1
        - TokenRelay=
      routes:
        - id: auth
          uri: http://localhost:8081/auth
          predicates:
            - Path=/auth/**
        - id: resource
          uri: http://localhost:8082
          predicates:
            - Path=/api/**
        - id: public
          uri: http://localhost:8083
          predicates:
            - Path=/public/**
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      client:
        registration:
          sso:
            clientId: client
            clientSecret: secret
            redirectUri: http://localhost:8080/login/oauth2/code/sso
            scope: profile
            authorization-grant-type: authorization_code
            provider: sso
        provider:
          sso:
            tokenUri: http://localhost:8081/auth/oauth/token
            authorizationUri: http://localhost:8081/auth/oauth/authorize
            userInfoUri: http://localhost:8081/auth/user/me
            userNameAttribute: name

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
